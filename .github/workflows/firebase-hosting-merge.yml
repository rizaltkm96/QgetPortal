# DISABLED — auto-deploy would overwrite WordPress on databaseqget.web.app
# Re-enable only if you deploy to a separate Firebase Hosting site.
# Manual run: Actions tab → "Deploy to Firebase Hosting on merge" → Run workflow

name: Deploy to Firebase Hosting on merge
on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter build web --release

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QGET_DB }}
          channelId: live
          projectId: databaseqget
