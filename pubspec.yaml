name: qget_portal
description: Qget Alumni Portal — Flutter app (Firebase wired via FlutterFire later).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_database: ^11.2.0
  firebase_storage: ^12.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  excel: ^4.0.6
  file_saver: ^0.2.14
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
